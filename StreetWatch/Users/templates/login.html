{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>
    <div id="Login">
        <h1>Login</h1>

        <form method="POST">
            {% csrf_token %}
            {{ forms.as_p }}


            <button type="submit" id="SubmitButton">Log in</button>
        </form>

        <p>Need an acocunt?<a href="{% url "signup" %}">Sign up</a></p>
    </div>
</body>
</html>
